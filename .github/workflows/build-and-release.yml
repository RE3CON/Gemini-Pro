name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Extract UserScript
        run: |
          cat << 'EOF' > extract.js
          import fs from 'fs';
          const appCode = fs.readFileSync('./src/App.tsx', 'utf8');
          const match = appCode.match(/const MERGED_SCRIPT = `([\s\S]*?)`;/);
          if (match && match[1]) {
            fs.writeFileSync('./google-ai-identity.user.js', match[1]);
            console.log('Successfully extracted UserScript');
          } else {
            console.error('Failed to extract script');
            process.exit(1);
          }
          EOF
          npx tsx extract.js

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-app-build
          path: dist/

      - name: Upload UserScript Artifact
        uses: actions/upload-artifact@v7
        with:
          name: userscript
          path: google-ai-identity.user.js

      - name: Zip Web App
        run: zip -r web-app.zip dist/

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v12.5.${{ github.run_number }}
          name: Release v12.5.${{ github.run_number }}
          files: |
            google-ai-identity.user.js
            web-app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
          npm version 12.5.${{ github.run_number }} --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "Deploy web app to GitHub Pages [skip ci]"
