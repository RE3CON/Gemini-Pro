name: Sync Wiki

# Force re-scan of workflow
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout wiki
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.WIKI_ACTION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Ensure docs directory exists in main
          if [ -d "main/docs" ]; then
            # Sync files from main/docs to wiki/
            rsync -av --delete main/docs/ wiki/ --exclude .git
            
            cd wiki
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Check if there are changes
            if [ -n "$(git status --porcelain)" ]; then
              git add .
              git commit -m "Sync documentation from main repository"
              
              # Use token in remote URL for push if WIKI_ACTION_TOKEN is provided
              if [ -n "${{ secrets.WIKI_ACTION_TOKEN }}" ]; then
                git remote set-url origin "https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git"
              fi
              
              git push
            else
              echo "No changes to sync."
            fi
          else
            echo "Docs directory not found in main repository."
          fi
